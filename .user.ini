; PHP settings for NFSN FastCGI/CGI — read by PHP-FPM and suPHP
; Place this file in the document root (/home/public)

upload_max_filesize = 8M
post_max_size = 8M

session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Strict

; Harden error output in production — override in config.local.php for dev
display_errors = Off
log_errors = On
